services:
  - type: web
    name: goat-farm-backend
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goat-farm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: FIRST_ADMIN_NAME
        value: Admin
      - key: FIRST_ADMIN_EMAIL
        value: admin@example.com
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: goat-farm-db
    databaseName: goatfarm
    user: goatfarm
